name: CI

on:
  push:
    branches: ["**"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
      - uses: actions/setup-python@v5
      - name: Install uv
      - runs: pip install uv
      - name: Install dependencies
      - runs: uv sync
      - name: Install ruff and mypy
      - runs: apt install ruff mypy -y
      - name: Ruff format
      - runs: python3 -m ruff format . --check
      - name: Ruff linter
      - runs: python3 -m ruff check . --fix
      - name: Unit tests
      - runs: python3 -m pytest ./core/tests/unit
      - name: Integration tests
      - runs: python3 -m pytest ./core/tests/integration
      - name: BDD tests
      - runs: python3 -m pytest ./core/tests/behaviour